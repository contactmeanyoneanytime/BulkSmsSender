name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # Remove any existing wrapper files to avoid conflicts
      - name: Clean wrapper files
        run: |
          rm -f gradlew gradlew.bat
          rm -rf gradle/wrapper

      # Manually download and install Gradle 8.7
      - name: Install Gradle 8.7
        run: |
          wget https://services.gradle.org/distributions/gradle-8.7-bin.zip
          unzip -q gradle-8.7-bin.zip
          echo "$PWD/gradle-8.7/bin" >> $GITHUB_PATH

      # Override project-level build.gradle.kts with known‑good versions (optional but safe)
      - name: Fix plugin versions (if needed)
        run: |
          cat > build.gradle.kts << 'EOF'
          plugins {
              id("com.android.application") version "8.5.0" apply false
              id("org.jetbrains.kotlin.android") version "1.9.20" apply false
              id("com.google.devtools.ksp") version "1.9.20-1.0.14" apply false
          }
          EOF

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BulkSmsSender-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
