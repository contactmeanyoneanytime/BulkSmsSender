name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Remove any local Gradle wrapper and properties
        run: |
          rm -f gradle/wrapper/gradle-wrapper.jar
          rm -f gradlew
          rm -f gradlew.bat
          # Remove agent line from gradle.properties if it exists
          if [ -f gradle.properties ]; then
            sed -i '/-javaagent/d' gradle.properties
            sed -i '/org.gradle.internal.agent/d' gradle.properties
          fi

      - name: Generate a clean Gradle wrapper (v8.5)
        run: |
          gradle wrapper --gradle-version=8.5 --distribution-type=bin
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --no-build-cache

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BulkSmsSender-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
