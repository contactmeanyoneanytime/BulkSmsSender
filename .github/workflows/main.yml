name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Remove instrumentation agent from gradle.properties (if present)
        run: |
          if [ -f gradle.properties ]; then
            sed -i '/org.gradle.internal.agent/d' gradle.properties
            sed -i '/-javaagent:/d' gradle.properties
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --no-build-cache

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BulkSmsSender-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
