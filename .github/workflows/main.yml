name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # Remove any stale wrapper or properties that could cause agent errors
      - name: Clean previous Gradle state
        run: |
          rm -rf .gradle
          rm -f gradle/wrapper/gradle-wrapper.jar
          rm -f gradlew gradlew.bat
          # Remove any -javaagent line from gradle.properties
          if [ -f gradle.properties ]; then
            sed -i '/-javaagent/d' gradle.properties
            sed -i '/org.gradle.internal.agent/d' gradle.properties
          fi

      # Use Gradle 8.7 (matches AGP 8.5.0 requirement)
      - name: Setup Gradle 8.7
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 8.7

      # Generate a fresh wrapper pointing to 8.7 (optional, but ensures consistency)
      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version=8.7 --distribution-type=bin

      # Build the debug APK
      - name: Build APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BulkSmsSender-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
