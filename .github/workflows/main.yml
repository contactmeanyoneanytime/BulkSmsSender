name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # Remove any leftover agent configuration
      - name: Clean Gradle properties and wrapper
        run: |
          rm -rf .gradle
          rm -f gradle/wrapper/gradle-wrapper.jar
          rm -f gradlew gradlew.bat
          if [ -f gradle.properties ]; then
            sed -i '/-javaagent/d' gradle.properties
            sed -i '/org.gradle.internal.agent/d' gradle.properties
          fi

      # Download and install Gradle 8.7 (required by AGP 8.5+)
      - name: Install Gradle 8.7
        run: |
          wget https://services.gradle.org/distributions/gradle-8.7-bin.zip
          unzip -q gradle-8.7-bin.zip
          echo "$PWD/gradle-8.7/bin" >> $GITHUB_PATH

      # Generate wrapper pointing to Gradle 8.7
      - name: Generate Gradle Wrapper 8.7
        run: |
          gradle wrapper --gradle-version=8.7 --distribution-type=bin
          chmod +x gradlew

      # Ensure project-level build.gradle.kts uses correct plugin versions
      - name: Fix plugin versions (if needed)
        run: |
          cat > build.gradle.kts << 'EOF'
          plugins {
              id("com.android.application") version "8.5.0" apply false
              id("org.jetbrains.kotlin.android") version "1.9.20" apply false
              id("com.google.devtools.ksp") version "1.9.20-1.0.14" apply false
          }
          EOF

      # Build debug APK
      - name: Build APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BulkSmsSender-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
